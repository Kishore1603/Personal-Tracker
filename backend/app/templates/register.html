{% extends "base.html" %}
{% block title %}Register — Life Tracker{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🌟 Life Tracker</h1>
            <p>Create your account</p>
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/register" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required
                       placeholder="e.g. john_doe" minlength="3" maxlength="50" />
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required placeholder="john@example.com" />
            </div>
            <div class="form-group">
                <label for="full_name">Full Name (optional)</label>
                <input type="text" id="full_name" name="full_name" placeholder="John Doe" />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required
                       placeholder="At least 8 characters" minlength="8" />
            </div>
            <button type="submit" class="btn btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Sign in</a></p>
    </div>
</div>
{% endblock %}
